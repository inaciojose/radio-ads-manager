services:

  # ============================================================
  # Banco de dados PostgreSQL
  # ============================================================
  postgres:
    image: postgres:16
    container_name: radio-ads-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # API (FastAPI)
  # ============================================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: radio-ads-api
    restart: unless-stopped
    env_file: .env.prod
    command: >
      sh -c "alembic upgrade head && python -m app.main"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Backups do banco — mapeia para o caminho configurado no host
      - ${BACKUP_DIR:-./backups}:/app/backups
      # Persistência dos offsets do monitor (sobrevive a restarts)
      - monitor_state:/tmp
      # Diretórios de logs do Zara Studio (somente leitura)
      # Configure LOG_DIR_FM e LOG_DIR_104 no .env.prod
      - ${LOG_DIR_FM}:/mnt/logs/fm:ro
      - ${LOG_DIR_104}:/mnt/logs/104_7:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ============================================================
  # Frontend (nginx servindo HTML/CSS/JS + proxy para /api/)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: radio-ads-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - api

volumes:
  postgres_data:
  monitor_state:
